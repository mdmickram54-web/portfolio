name: Feature Request
description: Suggest a new feature or enhancement for the eFax Components project
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement! 💡

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Clearly describe the feature you'd like to see
      placeholder: "I would like..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve? What use case does it address?
      placeholder: "Currently, users have to... but they should be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you implement this feature?
      placeholder: "This could be done by..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Are there other ways to solve this?
      placeholder: "Alternative approaches..."
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Usage Examples
      description: Show how this feature would be used
      placeholder: |
        ```javascript
        // Example usage
        ```
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: "Screenshots, links, references..."
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and feature requests
          required: true
        - label: This feature doesn't duplicate existing functionality
          required: true
        - label: I agree to follow the Code of Conduct
          required: true
